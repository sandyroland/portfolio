<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bonjour</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #2c2c2c; /* gris foncé */
        }

        /* Soleil en arrière-plan */
        .sun-background {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #FFD700 40%, transparent 41%);
            border-radius: 50%;
            z-index: 0;
        }

        /* Rayons */
        .sun-background::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            transform: translate(-50%, -50%);
            background: repeating-conic-gradient(
                #FFD700 0deg 10deg,
                transparent 10deg 20deg
            );
            border-radius: 50%;
            opacity: 0.6;
        }

        h1 {
            position: relative;
            z-index: 1;
            color: #ffcf39; /* texte assorti au soleil */
            font-size: 3em;
        }
    </style>
</head>
<body>

    <div class="sun-background"></div>
    <h1>Bonjour</h1>

</body>
</html>

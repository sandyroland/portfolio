<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bonjour</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #2c2c2c;
        }

        /* Soleil */
        .sun-background {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #FFD700 40%, transparent 41%);
            border-radius: 50%;
            z-index: 0;
        }

        /* Rayons lumineux */
        .sun-background::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 900px;
            height: 900px;
            transform: translate(-50%, -50%);
            background: repeating-conic-gradient(
                rgba(255, 215, 0, 0.8) 0deg 8deg,
                rgba(255, 215, 0, 0.1) 8deg 16deg
            );
            border-radius: 50%;
            filter: blur(8px);
            animation: rotate 20s linear infinite;
        }

        /* Animation rotation */
        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        h1 {
            position: relative;
            z-index: 1;
            font-size: 3em;
            color: #2c2c2c; /* même gris que le fond */
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.8),
                0 0 20px rgba(255, 215, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="sun-background"></div>
    <h1>Bonjour</h1>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bonjour</title>
    <style>
        body {
            background-color: #ffcf39;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 40px;
        }

        .sun {
            width: 120px;
            height: 120px;
            background: #FFD700;
            border-radius: 50%;
            position: relative;
        }

        /* yeux */
        .eye {
            width: 12px;
            height: 12px;
            background: black;
            border-radius: 50%;
            position: absolute;
            top: 40px;
        }

        .eye.left {
            left: 35px;
        }

        .eye.right {
            right: 35px;
        }

        /* sourire */
        .smile {
            width: 50px;
            height: 25px;
            border: 4px solid black;
            border-top: none;
            border-radius: 0 0 50px 50px;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <h1>Bonjour</h1>

    <div class="sun">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>
    </div>

</body>
</html>
